services:
  - type: web
    name: cardapio-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: "*"
      - key: DATABASE_URL
        sync: false  # preenchido manualmente no painel do Render
